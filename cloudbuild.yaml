steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/itsumo:$COMMIT_SHA", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/itsumo:$COMMIT_SHA"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - itsumo
      - --image=gcr.io/$PROJECT_ID/itsumo:$COMMIT_SHA
      - --region=asia-northeast1
      - --platform=managed
      - --no-allow-unauthenticated
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID

images:
  - "gcr.io/$PROJECT_ID/itsumo:$COMMIT_SHA"
