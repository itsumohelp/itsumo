{{define "base"}}<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}itsumo{{end}}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #f6f8fa;
      --surface: #ffffff;
      --border:  #d0d7de;
      --fg:      #24292f;
      --muted:   #57606a;
      --green:   #1a7f37;
      --purple:  #8250df;
      --red:     #cf222e;
      --blue:    #0969da;
      --mono:    ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    body { font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--fg); background: var(--bg); }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* nav */
    nav { background: #24292f; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    nav .brand { color: #fff; font-weight: 700; font-size: 16px; letter-spacing: -.3px; text-decoration: none; }
    nav .brand:hover { text-decoration: none; opacity: .85; }
    nav .nav-link { color: rgba(255,255,255,.75); font-size: 13px; }
    nav .nav-link:hover { color: #fff; text-decoration: none; }

    /* layout */
    .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }

    /* box */
    .box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 16px; }
    .box-header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg); border-radius: 6px 6px 0 0; display: flex; align-items: center; justify-content: space-between; }
    .box-body { padding: 16px; }

    /* badges */
    .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; }
    .badge-open     { background: #dafbe1; color: var(--green);  border: 1px solid #aceebb; }
    .badge-closed   { background: #fbefff; color: var(--purple); border: 1px solid #e2c5fd; }

    /* trade list row */
    .trade-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); color: var(--fg); text-decoration: none; transition: background .1s; }
    .trade-row:last-child { border-bottom: none; }
    .trade-row:hover { background: var(--bg); }
    .ticker  { font-family: var(--mono); font-weight: 700; font-size: 14px; min-width: 65px; }
    .t-name  { flex: 1; color: var(--muted); font-size: 13px; }
    .t-price { font-family: var(--mono); font-size: 13px; }
    .t-pnl   { font-family: var(--mono); font-size: 13px; font-weight: 600; min-width: 70px; text-align: right; }
    .t-meta  { color: var(--muted); font-size: 12px; min-width: 60px; text-align: right; }
    .pnl-pos { color: var(--green); }
    .pnl-neg { color: var(--red); }

    /* section label */
    .section-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 20px 0 8px; }

    /* timeline */
    .timeline { border-left: 2px solid var(--border); margin: 12px 0 12px 12px; padding-left: 20px; }
    .event-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 12px 16px; margin-bottom: 12px; }
    .event-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; color: var(--muted); font-size: 12px; }
    .kind-tag { background: var(--bg); border: 1px solid var(--border); padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; }
    .bot-tag { background: #e8f0ff; border: 1px solid #8ab4f8; color: #0b57d0; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; }
    .event-body { white-space: pre-wrap; line-height: 1.7; }
    .event-body a { color: var(--blue); text-decoration: underline; word-break: break-all; }
    .event-url { display: inline-block; font-size: 12px; color: var(--muted); margin-top: 6px; word-break: break-all; }
    .event-url:hover { color: var(--blue); }

    /* vote buttons */
    .votes { display: inline-flex; gap: 4px; margin-top: 10px; }
    .vote-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; cursor: pointer; font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 3px; transition: background .1s; }
    .vote-btn:hover { background: var(--bg); color: var(--fg); }

    /* rationale */
    .rationale { white-space: pre-wrap; line-height: 1.8; color: var(--fg); }

    /* entry/exit blocks */
    .anchor-block { padding: 16px; }
    .anchor-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 12px; }
    .anchor-price { font-family: var(--mono); font-size: 20px; font-weight: 700; }
    .anchor-date  { color: var(--muted); font-size: 13px; }
    .anchor-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* forms */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 13px; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 3px; }
    input[type=text], input[type=number], input[type=date], select, textarea {
      width: 100%; padding: 5px 12px;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--fg); background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px; outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
    textarea { min-height: 120px; resize: vertical; }

    /* buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 5px 16px; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; border-radius: 6px; border: 1px solid; cursor: pointer; text-decoration: none; white-space: nowrap; font-weight: 500; }
    .btn:hover { text-decoration: none; }
    .btn-primary { background: #2da44e; color: #fff; border-color: rgba(27,31,36,.15); }
    .btn-primary:hover { background: #2c974b; }
    .btn-default { background: var(--surface); color: var(--fg); border-color: var(--border); }
    .btn-default:hover { background: var(--bg); }
    .btn-danger  { background: #cf222e; color: #fff; border-color: rgba(27,31,36,.15); }
    .btn-danger:hover { background: #a40e26; }
    .btn-sm { padding: 3px 12px; font-size: 12px; }

    /* utils */
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-8  { gap: 8px; }
    .gap-12 { gap: 12px; }
    .mt-8  { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mb-4  { margin-bottom: 4px; }
    .mb-8  { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .empty { color: var(--muted); text-align: center; padding: 32px 16px; }
    .back-link { font-size: 13px; color: var(--muted); margin-bottom: 12px; display: inline-block; }
    .back-link:hover { color: var(--blue); }
    .muted { color: var(--muted); }
    .mono  { font-family: var(--mono); }

    /* latest price preview */
    .price-preview { border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; background: var(--surface); font-size: 13px; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .price-preview.ok { background: #f6ffed; border-color: #aceebb; }
    .price-preview.warn { background: #fff8f8; border-color: #f0b6bc; color: var(--red); }
    .price-preview-label { color: var(--muted); }
    .price-preview-value { font-family: var(--mono); font-weight: 700; font-size: 15px; color: var(--green); }
    .price-preview-meta { color: var(--muted); font-size: 12px; }

    /* company picker */
    .company-picker-controls { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
    .industry-grid { border: 1px solid var(--border); border-radius: 8px; padding: 8px; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; max-height: 220px; overflow: auto; background: var(--surface); width: 100%; max-width: 560px; margin: 0 auto; }
    .industry-tile { border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--muted); padding: 7px 6px; font-size: 12px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
    .industry-tile:hover { background: var(--bg); color: var(--fg); }
    .industry-tile.active { background: #e8f0ff; border-color: #8ab4f8; color: #0b57d0; font-weight: 600; }
    .industry-tile-icon { font-size: 17px; line-height: 1; }
    .industry-tile-name { line-height: 1.2; }
    .company-list { border: 1px solid var(--border); border-radius: 6px; max-height: 280px; overflow: auto; background: var(--surface); display: flex; flex-direction: column; align-items: stretch; }
    .company-chip { width: 100%; border: 0; border-bottom: 1px solid var(--border); background: transparent; padding: 10px 12px; text-align: left; display: flex; align-items: center; justify-content: flex-start; gap: 10px; cursor: pointer; }
    .company-chip:last-child { border-bottom: 0; }
    .company-chip:hover { background: var(--bg); }
    .company-chip-icon { font-size: 18px; line-height: 1.2; }
    .company-chip-line { min-width: 0; display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .company-chip-main { font-weight: 600; }
    .company-chip-sub { color: var(--muted); font-size: 12px; }

    /* entry reason */
    .reason-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .reason-option { border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; display: flex; flex-direction: column; gap: 2px; cursor: pointer; background: var(--surface); }
    .reason-option input { margin-bottom: 4px; }
    .reason-title { font-weight: 600; font-size: 13px; }
    .reason-sub { color: var(--muted); font-size: 12px; }
    .reason-pill { display: inline-flex; border: 1px solid var(--border); border-radius: 999px; padding: 3px 10px; font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .focus-params { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .focus-label { color: var(--muted); font-size: 12px; margin-right: 4px; }
    .focus-chip { border: 1px solid #b6c8f8; background: #eef3ff; color: #2854b6; border-radius: 999px; padding: 2px 8px; font-size: 12px; }

    @media (max-width: 720px) {
      .company-picker-controls { flex-direction: column; }
      .container { margin: 12px auto; padding: 0 10px; }
      nav { padding: 10px 12px; }
      .box-header { padding: 10px 12px; }
      .box-body { padding: 12px; }
      .industry-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); max-height: 240px; }
      .industry-tile { padding: 8px 4px; }
      .industry-tile-name { font-size: 11px; }
      .company-list { max-height: 320px; }
      .company-chip { padding: 11px 10px; }
      .company-chip-line { display: block; }
      .reason-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">itsumo</a>
    <div style="display:flex;gap:16px;align-items:center;">
      <a href="/holdings" class="nav-link">保持株</a>
      <a href="/prices/check" class="nav-link">株価確認</a>
      <a href="/trades/new" class="nav-link">+ 新規トレード</a>
      <form method="POST" action="/auth/logout" style="margin:0;">
        <button type="submit" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.75);font-size:13px;padding:0;">ログアウト</button>
      </form>
    </div>
  </nav>
  <div class="container">
    {{block "main" .}}{{end}}
  </div>
  <script>
    function refreshCompanyList() {
      if (!window.htmx) {
        return;
      }
      var industryInput = document.getElementById("industry");
      var keywordInput = document.getElementById("company-q");
      htmx.ajax("GET", "/companies/options", {
        target: "#company-list-wrap",
        swap: "innerHTML",
        values: {
          industry: industryInput ? industryInput.value : "",
          q: keywordInput ? keywordInput.value : ""
        }
      });
    }

    function setIndustryFilter(el) {
      if (!el) {
        return;
      }
      var industryInput = document.getElementById("industry");
      var nextValue = (el.dataset && el.dataset.industry) ? el.dataset.industry : "";
      var currentValue = industryInput ? industryInput.value : "";

      if (nextValue !== "" && currentValue === nextValue) {
        nextValue = "";
        var allTile = document.querySelector('.industry-tile[data-industry=""]');
        if (allTile) {
          el = allTile;
        }
      }

      if (industryInput) {
        industryInput.value = nextValue;
      }
      document.querySelectorAll(".industry-tile").forEach(function(chip) {
        chip.classList.toggle("active", chip === el);
      });
      refreshCompanyList();
    }

    function selectCompanyFromEl(el) {
      if (!el || !el.dataset) {
        return;
      }
      selectCompany(el.dataset.code || "", el.dataset.name || "");
    }

    function selectCompany(code, name) {
      var tickerInput = document.getElementById("ticker");
      var nameInput = document.getElementById("name");
      if (tickerInput) {
        tickerInput.value = code;
        if (window.htmx) {
          htmx.trigger(tickerInput, "changed");
        }
      }
      if (nameInput) {
        nameInput.value = name;
      }
    }
  </script>
</body>
</html>
{{end}}
