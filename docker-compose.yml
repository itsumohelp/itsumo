version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: itsumo
      POSTGRES_USER: itsumo_app
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itsumo_app -d itsumo"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      PORT: "3000"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: itsumo_app
      PGPASSWORD: localdev
      PGDATABASE: itsumo
      PGSSLMODE: disable
      SESSION_SECRET: localdevsecret32bytespadding000
      WEBAUTHN_RPID: localhost
      WEBAUTHN_RPORIGIN: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
